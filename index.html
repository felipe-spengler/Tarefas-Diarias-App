<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Redireciona usuários web para a página de download (evita tela em branco do servidor)
      // Mantém funcionamento normal local dentro do APK (localhost/capacitor)
      if (window.location.hostname !== 'localhost' && 
          !window.location.hostname.startsWith('127.0.0.1') &&
          !window.location.hostname.startsWith('192.168.') &&
          !window.location.href.startsWith('file:') && 
          !window.location.href.startsWith('capacitor:')) {
        window.location.replace('./download.html');
      }
    </script>
    <link rel="icon" type="image/png" href="/app_icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Tasks – Rotinas e Alarmes</title>
    <meta name="description" content="Gerenciador de rotinas e eventos com notificações em segundo plano." />
  </head>
  <body class="bg-[#0a0a0a] text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
